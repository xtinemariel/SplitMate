[auth]
allowed_redirect_urls = [
  "http://localhost:3000/api/auth/callback",
  "http://localhost:3000/login",
  "http://localhost:3000/signup",

   # Production (Vercel)
  "https://split-mate-xtinemariel.vercel.app//api/auth/callback",
  "https://split-mate-xtinemariel.vercel.app/login",
  "https://split-mate-xtinemariel.vercel.app/signup",
]
require_email_verification = true
verify_email_method = "code"
reset_password_method = "code"
disable_signup = false

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[auth.smtp]
enabled = false
host = ""
port = 465
username = ""
sender_email = ""
sender_name = ""
min_interval_seconds = 60

[storage]
max_file_size_mb = 50

[realtime]
retention_days = 0

[schedules]
retention_days = 7
